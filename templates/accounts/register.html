{% extends 'base.html' %}
{% block title %}Register - KrishiKart{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">
                        <span class="brand-icon">🌾</span> Create Account
                    </h3>
                    <p class="text-center text-muted mb-4">Join KrishiKart and support local farmers</p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" name="username" class="form-control form-control-lg"
                                   placeholder="Choose a username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control form-control-lg"
                                   placeholder="Enter your email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="Create a password" required>
                        </div>
                        <div class="form-check mb-3">
                            <input type="checkbox" name="is_farmer" class="form-check-input" id="is_farmer">
                            <label class="form-check-label" for="is_farmer">I'm registering as a Farmer</label>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg w-100">
                            <i class="fas fa-user-plus me-2"></i> Create Account
                        </button>
                    </form>

                    <p class="text-center mt-4">
                        <a href="{% url 'login' %}" class="text-decoration-none">
                            <i class="fas fa-sign-in-alt me-1"></i> Already have account? Sign in
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
