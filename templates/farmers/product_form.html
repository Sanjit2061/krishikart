{% extends 'base.html' %}
{% block title %}{% if product %}Edit{% else %}Add{% endif %} Product{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="bg-white rounded-4 shadow-sm p-4">
                <h4 class="mb-4">{% if product %}Edit{% else %}Add New{% endif %} Product</h4>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Product Name</label>
                        <input type="text" name="name" class="form-control" value="{{ product.name|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Category</label>
                        <select name="category" class="form-select" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="3" required>{{ product.description|default:'' }}</textarea>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Price (Rs)</label>
                            <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price|default:'' }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Old Price (optional)</label>
                            <input type="number" step="0.01" name="old_price" class="form-control" value="{{ product.old_price|default:'' }}">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Unit</label>
                            <input type="text" name="unit" class="form-control" value="{{ product.unit|default:'kg' }}" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Stock</label>
                            <input type="number" name="stock" class="form-control" value="{{ product.stock|default:0 }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Image URL</label>
                        <input type="url" name="image_url" class="form-control" value="{{ product.image_url|default:'' }}" placeholder="https://...">
                    </div>
                    <div class="form-check mb-2">
                        <input type="checkbox" name="is_organic" class="form-check-input" id="is_organic" {% if product.is_organic %}checked{% endif %}>
                        <label class="form-check-label" for="is_organic">Organic</label>
                    </div>
                    {% if product %}
                    <div class="form-check mb-3">
                        <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if product.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Visible to customers</label>
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-success w-100 rounded-pill">Save Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
